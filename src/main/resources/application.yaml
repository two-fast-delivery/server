spring:
  application:
    name: TwoFastDelivery

  datasource:
    url: jdbc:postgresql://localhost:5432/twofastdelivery
    username:
    password:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080