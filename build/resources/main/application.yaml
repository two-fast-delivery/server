spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  application:
    name: TwoFastDelivery

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/twofast
    username: postgres
    password: 1234

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  messages:
    basename: messages
    encoding: UTF-8
    always-use-message-format: true

  ai:
    openai:
      api-key: GEMINI_API_KEY=AIzaSyA73PwC0xKGpyzuSmGe04P7xYTwuuudvgs
      base-url: https://generativelanguage.googleapis.com/v1beta/openai/
    chat:
      options:
        model: gemini-2.0-flash-exp

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: nbcamp.TwoFastDelivery.domain.product.dto
  configuration:
    map-underscore-to-camel-case: true

gemini:
  api:
    key: GEMINI_API_KEY=AIzaSyA73PwC0xKGpyzuSmGe04P7xYTwuuudvgs
    url: "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent"

logging:
  level:
    org.hibernate.type: trace
    org.hibernate.orm.jdbc.bind: trace
    org.springframework.ai.chat.client.advisor: DEBUG

springdoc:
  version: '1.0.0'
  api-docs:
    path: /api-docs
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  swagger-ui:
    operations-sorter: alpha
    tags-sorter: alpha
    path: /api-docs.html
    disable-swagger-default-url: true
    doc-expansion: full
    groups-order: asc
    display-request-duration: true
  show-actuator: true
  model-and-view-allowed: true
  override-with-generic-response: false

jwt:
  secret: YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd6eXoxMjMxMjMxMjMxMjMxMjMxMzEyMzEyMzEzMTIzMTIzMTIzMTMxMjMxMzEzMTMxMjM
  valid-time: ${JSON_WEB_TOKEN_VALID_TIME:3600}