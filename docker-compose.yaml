services:
  db:
    image: postgres:latest
    container_name: db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"

  app:
    build: .
    container_name: app
    ports:
      - "8080:8080"
    environment:
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DDL_AUTO: ${DB_DDL_AUTO}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      JSON_WEB_TOKEN_SECRET: ${JSON_WEB_TOKEN_SECRET}
      JSON_WEB_TOKEN_VALID_TIME: ${JSON_WEB_TOKEN_VALID_TIME}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - db
